# .github/workflows/deploy.yml
# planetapsilo Phase 2 CI/CD — Phase 1 FOUND-10 + Phase 2 CONT-14 (D-25).
#
# Trigger: push to main OR manual dispatch.
# Build: manual chain — checkout, setup Node 22, npm ci, astro build, copy-lint, upload Pages artifact.
# Deploy: actions/deploy-pages@v4 publishes to the GitHub Pages environment.
# Gate: scripts/copy-lint.mjs runs AFTER build, BEFORE upload — a failing lint blocks deploy.
# Permissions: minimum scope — read contents, write Pages, write id-token for OIDC.

name: Deploy Astro site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        run: npm run build

      - name: Lint copy against docs/copy-glossary.md PROHIBIDO list
        run: node scripts/copy-lint.mjs
        # Phase 2 D-25 gate: any non-exempt PROHIBIDO match → exit 1 → deploy job (needs: build) never runs.
        # Source-of-truth: docs/copy-glossary.md §PROHIBIDO + §Exemptions.

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
